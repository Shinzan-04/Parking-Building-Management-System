<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login Test</title>
    <!-- Load Google Identity Services library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            background-color: #e8f0fe;
            border: 1px solid #d2e3fc;
            border-radius: 4px;
            display: none;
            word-wrap: break-word;
            text-align: left;
        }

        code {
            display: block;
            white-space: pre-wrap;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Parking System</h2>
        <p>Test Google OAuth Login</p>

        <!-- Google Sign-In Button Container -->
        <div id="g_id_onload" data-client_id="905860478642-qn2i8h65ouunbv3tqm40gs1muprtbide.apps.googleusercontent.com"
            data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse"
            data-auto_prompt="false">
        </div>

        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
            data-text="signin_with" data-size="large" data-logo_alignment="left">
        </div>

        <div id="result">
            <h4>Backend Response:</h4>
            <code id="response-content"></code>
        </div>
    </div>

    <script>
        async function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);

            // Call the local backend API
            try {
                const res = await fetch("http://localhost:5237/api/auth/google-login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        idToken: response.credential
                    })
                });

                const data = await res.json();

                const resultDiv = document.getElementById('result');
                const contentCode = document.getElementById('response-content');

                resultDiv.style.display = 'block';

                if (res.ok) {
                    contentCode.style.color = "green";
                    contentCode.innerText = JSON.stringify(data, null, 2);
                    console.log("Login Success", data);
                } else {
                    contentCode.style.color = "red";
                    contentCode.innerText = "Error: " + JSON.stringify(data, null, 2);
                    console.error("Login Failed", data);
                }
            } catch (error) {
                console.error("Network or Fetch Error", error);
                document.getElementById('result').style.display = 'block';
                document.getElementById('response-content').style.color = "red";
                document.getElementById('response-content').innerText = "Network Error: Is the backend running on http://localhost:5237 ?";
            }
        }
    </script>
</body>

</html>
